name: Release

on:
  push:
    tags:
      - 'v.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package English outputs
        run: |
          zip -j lonelog-en-${{ github.ref_name }}.zip \
            output/en/*.pdf output/en/*.epub output/en/*.odt output/en/*.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lonelog ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            lonelog-en-${{ github.ref_name }}.zip
