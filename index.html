<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lonelog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Lonelog',
      repo: 'https://github.com/zeruhur/lonelog',
      loadSidebar: true,
      loadNavbar: true,
      fallbackLanguages: ['en'],
      alias: {
        '/en/latest/en/(.*)':    '/en/latest/en/$1',
        '/en/latest/it/(.*)':    '/en/latest/it/$1',
        '/en/latest/fr/(.*)':    '/en/latest/fr/$1',
        '/en/latest/_sidebar.md': '/en/latest/_sidebar.md',
        '/en/latest/_navbar.md':  '/en/latest/_navbar.md',
        '/.*/_navbar.md':         '/_navbar.md',
        '/.*/_sidebar.md':        '/_sidebar.md',
      },
      search: {
        paths: 'auto',
        placeholder: {
          '/it/': 'Cerca...',
          '/fr/': 'Rechercher...',
          '/':    'Search...'
        },
        noData: {
          '/it/': 'Nessun risultato',
          '/fr/': 'Aucun r\u00e9sultat',
          '/':    'No results'
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
